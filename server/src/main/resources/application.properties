spring.application.name=server
server.port=8090

spring.datasource.url=${DB_URL:jdbc:h2:mem:vision_guard_dev;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

app.yolo.python-executable=${YOLO_PYTHON_EXECUTABLE:python3}
app.yolo.model-path=${YOLO_MODEL_PATH:}
app.yolo.work-dir=${YOLO_WORK_DIR:${java.io.tmpdir}/vision-guard-yolo}
app.yolo.script-resource=python/yolo_detect.py
app.yolo.request-timeout-seconds=${YOLO_REQUEST_TIMEOUT_SECONDS:1800}
